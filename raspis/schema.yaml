components:
  schemas:
    AcademicYear:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        start_date:
          type: string
          format: date
          title: Дата начала
        end_date:
          type: string
          format: date
          title: Дата конца
        total_weeks:
          type: integer
          maximum: 2147483647
          minimum: 1
          title: Всего недель
        school:
          type: integer
          title: Школа
      required:
      - end_date
      - id
      - school
      - start_date
      - total_weeks
    BellSchedule:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        shift_number:
          type: integer
          maximum: 2147483647
