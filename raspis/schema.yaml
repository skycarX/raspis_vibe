          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ScheduleEntryWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ScheduleEntryWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleEntryWrite'
          description: ''
    patch:
      operationId: schedule_partial_update
      description: |-
        Расписание.
        - GET (list/retrieve) — все авторизованные.
        - POST/PUT/PATCH/DELETE — только is_staff (администраторы).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Урок в расписании.
        required: true
      tags:
      - schedule
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedScheduleEntryWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedScheduleEntryWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedScheduleEntryWrite'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleEntryWrite'
          description: ''
    delete:
      operationId: schedule_destroy
      description: |-
        Расписание.
        - GET (list/retrieve) — все авторизованные.
        - POST/PUT/PATCH/DELETE — только is_staff (администраторы).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Урок в расписании.
        required: true
      tags:
      - schedule
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
