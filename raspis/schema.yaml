  /api/schedule/:
    get:
      operationId: schedule_list
      description: |-
        Расписание.
        - GET (list/retrieve) — все авторизованные.
        - POST/PUT/PATCH/DELETE — только is_staff (администраторы).
      parameters:
      - in: query
        name: academic_year
        schema:
          type: integer
      - in: query
        name: class_group
        schema:
          type: integer
      - in: query
        name: class_group__school
        schema:
          type: integer
      - in: query
        name: day_of_week
        schema:
          type: integer
      - in: query
        name: is_substitution
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: room
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: subgroup
        schema:
          type: integer
      - in: query
        name: subject
        schema:
          type: integer
      - in: query
        name: teacher
        schema:
          type: integer
      - in: query
        name: week_parity
        schema:
          type: integer
          title: Чётность недели
          enum:
          - 0
          - 1
          - 2
        description: |-
          * `0` - Обе недели
          * `1` - Нечётная
          * `2` - Чётная
      tags:
      - schedule
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedScheduleEntryReadList'
          description: ''
    post:
      operationId: schedule_create
      description: |-
        Расписание.
        - GET (list/retrieve) — все авторизованные.
        - POST/PUT/PATCH/DELETE — только is_staff (администраторы).
      tags:
      - schedule
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleEntryWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ScheduleEntryWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ScheduleEntryWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
